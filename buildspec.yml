version: 0.2

env:
  variables:
    PYTHONPATH: $CODEBUILD_SRC_DIR
    PYSPARK_PYTHON: python3
    PYSPARK_DRIVER_PYTHON: python3

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Upgrading pip..."
      - python -m pip install --upgrade pip
      - echo "Installing dependencies..."
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Checking versions..."
      - python --version
      - java -version

  build:
    commands:
      - echo "Running unit tests..."
      - pytest -v --disable-warnings --maxfail=1 --junitxml=junit.xml

reports:
  pytest_reports:
    files:
      - junit.xml
    file-format: JUNITXML

artifacts:
  files:
    - junit.xml
  name: junit-$(date +%Y%m%d-%H%M%S).xml
  discard-paths: yes
